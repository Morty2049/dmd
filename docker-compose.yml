services:
  # L1 cold storage — Qdrant vector DB for semantic search over the
  # swarm log. Persistent on disk at ~/.dmd/qdrant_storage so data
  # survives container restarts and lives in the same user-global
  # directory as the hot log (~/.dmd/swarm.jsonl).
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dmd-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - ${HOME}/.dmd/qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
